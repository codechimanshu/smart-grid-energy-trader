name: smart-grid-energy-trader
version: "1.0.0"
description: >
  Real-world renewable energy microgrid management.
  Agent decides hourly: store solar/wind energy, distribute to homes,
  or sell to the city grid based on price, weather, and demand.

observation_space:
  battery_level:  {type: float, range: [0, 100],  unit: percent}
  solar_output:   {type: float, range: [0, 15],   unit: kWh}
  wind_output:    {type: float, range: [0, 14],   unit: kWh}
  grid_price:     {type: float, range: [2.5, 30], unit: Rs_per_kWh}
  home_demand:    {type: float, range: [3, 13],   unit: kWh}
  hour_of_day:    {type: int,   range: [0, 23]}
  day:            {type: int,   range: [1, 7]}
  weather:        {type: str,   values: [sunny, cloudy, stormy]}

action_space:
  type: discrete
  n: 3
  actions:
    0: {name: STORE,      description: Charge battery with surplus energy}
    1: {name: DISTRIBUTE, description: Send energy to local homes}
    2: {name: SELL,       description: Sell energy to city grid for revenue}

reward:
  range: [-1.0, 1.0]
  components:
    - revenue from selling (positive)
    - shortage penalty when homes lack power (negative)
    - waste penalty when battery overflows (negative)
    - battery health bonus 30–80% (small positive)

tasks:
  - id: 1
    name: Single Decision
    difficulty: easy
    max_steps: 1
  - id: 2
    name: 24-Hour Day Manager
    difficulty: medium
    max_steps: 24
  - id: 3
    name: 7-Day Storm Survival
    difficulty: hard
    max_steps: 168

api:
  reset:  {method: POST, path: /reset}
  step:   {method: POST, path: /step}
  state:  {method: GET,  path: /state}
  tasks:  {method: GET,  path: /tasks}
  grade:  {method: POST, path: /grade}
  health: {method: GET,  path: /health}
